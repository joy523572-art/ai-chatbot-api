<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        #chat { background: white; border-radius: 10px; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 10px; }
        .user { text-align: right; color: #0066cc; margin: 10px 0; }
        .bot { text-align: left; color: #333; margin: 10px 0; }
        #input { width: 80%; padding: 10px; }
        #send { width: 18%; padding: 10px; }
    </style>
</head>
<body>
    <h1>AI Chatbot</h1>
    <div id="chat"></div>
    <input id="input" type="text" placeholder="Type a message...">
    <button id="send">Send</button>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');

        send.onclick = async () => {
            const message = input.value;
            if (!message) return;
            
            chat.innerHTML += `<div class="user">You: ${message}</div>`;
            input.value = '';
            
            const res = await fetch('/.netlify/functions/chat', {
                method: 'POST',
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            
            chat.innerHTML += `<div class="bot">Bot: ${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        };

        input.onkeypress = (e) => {
            if (e.key === 'Enter') send.onclick();
        };
    </script>
</body>
</html>
